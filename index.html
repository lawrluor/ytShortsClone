<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Shorts TikTok Clone</title>

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="static/img/favicon.ico">
  <link rel="icon" type="image/png" href="static/img/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="static/img/favicon-16x16.png" sizes="16x16">
  <link rel="apple-touch-icon" sizes="180x180" href="static/img/apple-touch-icon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="static/css/reset.css">
  <link rel="stylesheet" href="static/css/toast.css">
  <link rel="stylesheet" href="static/css/main.css">
</head>

<body>
  <div id="desktopWarning" style="display: none;">
    This experience is designed for mobile browsers. Please try again with a mobile device.
  </div>
  <!-- controls (start/stop) -->
  <div id="startContainer">
    <div id="startButton" onclick="beginExperiment();">Start Experiment</div>
  </div>

  <!-- Not rendered until we start the experiment -->
  <!-- <div onclick="playVideo(0);">start</div> -->
  <div id="container" class="container">
    <!-- iframes of videos will be generated here -->
    <button id="stopButton" onclick="endExperiment();">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-square-x-icon lucide-square-x">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
        <path d="m15 9-6 6" />
        <path d="m9 9 6 6" />
      </svg>
    </button>
    <div id="toast" class="toast hide">Slow Down</div>
  </div>

  <!-- Not rendered until we stop the experiment -->
  <div id="endContainer">
    <div class="endButtonContainer">
      <div class="endButton" style="border: 2px solid white;" onclick="location.reload();">Restart Experiment</div>
      <div class="endButton" style="background-color: green;" onclick="downloadCSV();">Download Data</div>
    </div>
  </div>

  <script src="static/js/script.js"></script>

  <!-- Generate iframes inside #container -->
  <script>
    renderVideos([
      "https://www.youtube.com/embed/MBzSnXjyGUQ?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=MBzSnXjyGUQ",
      "https://www.youtube.com/embed/0KiHR3tqDRI?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=0KiHR3tqDRI",
      "https://www.youtube.com/embed/sTiS0NDLGBg?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=sTiS0NDLGBg",
      "https://www.youtube.com/embed/_ThtqoNKTsQ?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=_ThtqoNKTsQ",
      "https://www.youtube.com/embed/JmDD8RReo5s?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=JmDD8RReo5s",
      "https://www.youtube.com/embed/0q0xS7W78KQ?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=0q0xS7W78KQ",
      "https://www.youtube.com/embed/9mUhkhs_os8?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=9mUhkhs_os8",
      "https://www.youtube.com/embed/_ffyXlDm9RU?enablejsapi=1&mute=1&amp;loop=1&amp;playlist=_ffyXlDm9RU"
    ], true);
  </script>
</body>

</html>
